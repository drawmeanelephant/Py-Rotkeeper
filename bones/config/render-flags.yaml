# Rotkeeper Render Configuration
default_template: default
output_dir: output
markdown_extensions:
  - tables
  - fenced_code
  - codehilite
  - toc
  - attr_list
  - def_list
  - admonition
  - smarty
  - mathjax
render_options:
  generate_toc: true
  code_theme: default
  output_extension: .html
  pretty_html: true
manifest:
  enabled: true
  filename: manifest.json
  include_hashes: true
watch:
  watch_dirs:
    - content
    - bones/templates
    - bones/config
    - bones/assets/styles
  patterns:
    - "*.md"
    - "*.html"
    - "*.yaml"
    - "*.scss"
  debounce_ms: 500
